<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ayan Nayak | Portfolio</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  background: #000;
  color: #fff;
}

/* NAVBAR */
header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 18px 40px;
  border-bottom: 1px solid #222;
}

header h1 {
  color: #00aaff;
}

nav a {
  color: #ccc;
  margin-left: 20px;
  text-decoration: none;
  transition: 0.3s;
}

nav a:hover {
  color: #00aaff;
}

/* HERO */
.hero {
  padding: 80px 20px;
  text-align: center;
}

.hero h2 {
  font-size: 42px;
}

.hero span {
  color: #00aaff;
}

.hero p {
  margin-top: 10px;
  color: #aaa;
}

.btn {
  margin-top: 20px;
  padding: 10px 25px;
  background: #00aaff;
  border: none;
  border-radius: 5px;
  cursor: pointer;
  color: #fff;
}

.btn:hover {
  background: #0088cc;
}

/* SECTIONS */
section {
  padding: 60px 20px;
  text-align: center;
}

h2 {
  color: #00aaff;
  margin-bottom: 20px;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
  gap: 20px;
}

.card {
  background: #111;
  border: 1px solid #222;
  padding: 15px;
  transition: 0.3s;
}

.card img {
  width: 100%;
}

.card:hover {
  border-color: #00aaff;
}

/* CONTACT */
a {
  color: #00aaff;
}

/* FOOTER */
footer {
  border-top: 1px solid #222;
  padding: 15px;
  text-align: center;
  color: #888;
}

/* MOBILE */
@media(max-width:600px){
  .hero h2 {
    font-size: 26px;
  }
}
</style>

</head>

<body>

<header>
  <h1>Ayan Nayak</h1>
  <nav>
    <a href="#about">About</a>
    <a href="#work">Work</a>
    <a href="#contact">Contact</a>
  </nav>
</header>

<div class="hero">
  <h2>Hello, I'm <span>Ayan Nayak</span></h2>
  <p>Graphic Designer & Video Editor</p>
  <button class="btn" onclick="goContact()">Contact Me</button>
</div>

<section id="about">
  <h2>About</h2>
  <p>I design clean visuals and edit professional videos with a modern style.</p>
</section>

<section id="work">
  <h2>Work</h2>
  <div class="grid">

    <div class="card">
      <img src="design1.jpg">
      <p>Design Work 1</p>
    </div>

    <div class="card">
      <img src="design2.jpg">
      <p>Design Work 2</p>
    </div>

    <div class="card">
      <img src="design3.jpg">
      <p>Design Work 3</p>
    </div>

  </div>
</section>

<section id="contact">
  <h2>Contact</h2>
  <p>Email: <a href="mailto:ayannayak08@gmail.com">ayannayak08@gmail.com</a></p>
</section>

<footer>
  © 2026 Ayan Nayak
</footer>

<script>
function goContact(){
  document.getElementById("contact").scrollIntoView({behavior:"smooth"});
}
</script>

</body>
</html>
